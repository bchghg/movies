<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل فيديو احترافي</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #1a1a1a; margin: 0; }
        .container { width: 90%; max-width: 800px; text-align: center; color: white; }
        video { width: 100%; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .controls { margin-top: 20px; background: #333; padding: 15px; border-radius: 8px; }
        input { width: 80%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: none; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>مشغل الفيديو الخاص بك</h2>
    
    <video id="myVideo" controls>
        تصفحك لا يدعم مشغل الفيديو.
    </video>

    <div class="controls">
        <label>رابط الفيديو (MP4):</label>
        <input type="text" id="videoUrl" placeholder="ضع رابط الفيديو هنا...">
        
        <label>ملف الترجمة (SRT أو VTT):</label>
        <input type="file" id="subtitleFile" accept=".vtt,.srt">
        
        <button onclick="loadContent()" style="padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px;">تشغيل</button>
    </div>
</div>

<script>
    function loadContent() {
        const video = document.getElementById('myVideo');
        const videoUrl = document.getElementById('videoUrl').value;
        const subtitleInput = document.getElementById('subtitleFile');

        if (videoUrl) {
            // تحديث رابط الفيديو
            video.src = videoUrl;
        }

        if (subtitleInput.files.length > 0) {
            // إزالة أي ترجمة قديمة
            const oldTrack = video.querySelector('track');
            if (oldTrack) video.removeChild(oldTrack);

            // إنشاء مسار ترجمة جديد من الملف المرفوع من الهاتف
            const file = subtitleInput.files[0];
            const reader = new FileReader();

            reader.onload = function(e) {
                const track = document.createElement('track');
                track.kind = 'subtitles';
                track.label = 'العربية';
                track.srclang = 'ar';
                track.src = URL.createObjectURL(file);
                track.default = true;
                video.appendChild(track);
                
                // إعادة تحميل الفيديو لتفعيل التغييرات
                video.load();
                video.play();
            };
            reader.readAsText(file);
        } else {
            video.load();
            video.play();
        }
    }
</script>

</body>
</html>
